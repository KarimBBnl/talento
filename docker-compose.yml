version: '3.8'

services:
  # Next.js Application
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  # PostgreSQL Database (opcional - para cuando se implemente)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: elijoquedarme
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
